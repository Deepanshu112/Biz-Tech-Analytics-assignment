version: '3.8'

services:
  backend:
    build: ./backend
    container_name: productivity_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/dashboard.db:/app/dashboard.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: productivity_frontend
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
